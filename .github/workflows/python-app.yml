# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        pip install flake8 pytest pytest-cov
        if (Test-Path requirements.txt) {
            pip install -r requirements.txt
        }
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        # run the full test suite and generate coverage reports
        pytest tests/ --cov=src --cov-report=xml --cov-report=term
        # optionally, show a summary of the custom runner script
        if (Test-Path .\run_tests.bat) {
            Write-Host "Running helper script for sanity"
            & .\run_tests.bat
        }
    
    # --- new steps for building an executable and uploading it as an artifact ---
    - name: Install build tools
      run: |
        pip install pyinstaller
    - name: Build executable
      env:
        KIVY_GL_BACKEND: angle_sdl2
      run: |
        # make a single-file Windows executable from the entry point
        # include custom icon file
        pyinstaller --log-level WARNING --onefile --windowed --name=servo_emulator --icon=./icon.ico --hidden-import=kivy_deps.angle --hidden-import=kivy_deps.glew --hidden-import=kivy_deps.sdl2 --collect-all kivy_deps.angle --collect-all kivy_deps.glew --collect-all kivy_deps.sdl2 --collect-all kivy src/main.py
    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: servo_emulator
        path: dist/servo_emulator.exe

